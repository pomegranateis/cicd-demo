name: Java CI with Maven and Security

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Verify Java Setup
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version
          which java

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Perform the Unit Test Cases
        run: ./mvnw -B test
  security:
    needs: test
    name: Security Analysis with Snyk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Verify Java Setup
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version
          which java

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Test Maven wrapper
        run: |
          echo "Current directory: $(pwd)"
          echo "Maven wrapper location: $(ls -la mvnw)"
          ./mvnw --version

      - name: Build project for Snyk analysis
        run: ./mvnw clean compile

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=pom.xml --severity-threshold=high --fail-on=upgradable --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

      - name: Monitor dependencies with Snyk
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=pom.xml
