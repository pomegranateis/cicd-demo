# Enhanced GitHub Actions workflow with comprehensive Snyk integration
# This file demonstrates advanced Snyk configuration for the practical guide
name: Enhanced CI/CD with Comprehensive Security      - name: Snyk Container scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: cicd-demo:latest
          args: >
            --severity-threshold=high
            --exclude-base-image-vulns
            --project-name=${{ github.repository }}-container
            --sarif-file-output=snyk-container.sarif
            --json-file-output=snyk-container.json

      - name: Check SARIF file existence
        run: |
          if [ -f "snyk-container.sarif" ]; then
            echo "SARIF file exists"
            ls -la snyk-container.sarif
            cat snyk-container.sarif | head -20
          else
            echo "SARIF file not found - creating empty one for upload"
            echo '{"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Snyk Container"}}, "results": []}]}' > snyk-container.sarif
          fi

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-container.sarif
          category: snyk-containeranches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  schedule:
    # Run security scan every Monday at 2 AM UTC
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write
  issues: write
  actions: read

env:
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx1024m"

jobs:
  # Detect changes to optimize workflow execution
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.changes.outputs.code }}
      dependencies: ${{ steps.changes.outputs.dependencies }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            code:
              - 'src/**'
              - '!src/test/**'
            dependencies:
              - 'pom.xml'
              - '.snyk'
            docker:
              - 'Dockerfile'
              - 'dockerrun.aws.json'

  # Build and test job
  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.dependencies == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: maven

      - name: Verify Java Setup
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version
          which java

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run unit tests
        run: ./mvnw -B test --file pom.xml

      - name: Generate test coverage report
        run: ./mvnw jacoco:report

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  # Comprehensive security scanning with matrix strategy
  security:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always() && (needs.changes.outputs.code == 'true' || needs.changes.outputs.dependencies == 'true' || github.event_name == 'schedule')

    strategy:
      fail-fast: false
      matrix:
        scan-type: [dependencies, code]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: maven

      - name: Verify Java Setup
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version
          which java

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build project (required for comprehensive scanning)
        run: ./mvnw clean compile -DskipTests

      - name: Run Snyk Dependency Scan
        if: matrix.scan-type == 'dependencies'
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --file=pom.xml
            --severity-threshold=medium
            --fail-on=upgradable
            --project-name=${{ github.repository }}-dependencies
            --sarif-file-output=snyk-dependencies.sarif

      - name: Run Snyk Code Security Scan (SAST)
        if: matrix.scan-type == 'code'
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: >
            --severity-threshold=high
            --project-name=${{ github.repository }}-code
            --sarif-file-output=snyk-code.sarif

      - name: Upload SARIF results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk-${{ matrix.scan-type }}.sarif') != ''
        with:
          sarif_file: snyk-${{ matrix.scan-type }}.sarif
          category: snyk-${{ matrix.scan-type }}

      - name: Archive security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-${{ matrix.scan-type }}-results
          path: snyk-${{ matrix.scan-type }}.sarif
          retention-days: 30

  # Container security scanning
  container-security:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.docker == 'true' || github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: maven

      - name: Verify Java Setup
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version
          which java

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build application JAR
        run: ./mvnw clean package -DskipTests

      - name: Build Docker image
        run: |
          docker build -t cicd-demo:${{ github.sha }} .
          docker tag cicd-demo:${{ github.sha }} cicd-demo:latest

      - name: Run Snyk Container Scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: cicd-demo:latest
          args: >
            --severity-threshold=high
            --exclude-base-image-vulns
            --project-name=${{ github.repository }}-container
            --sarif-file-output=snyk-container.sarif
            --json-file-output=snyk-container.json

      - name: Check scan results and ensure SARIF exists
        run: |
          echo "Checking Snyk scan outputs..."
          ls -la *.sarif *.json 2>/dev/null || echo "No SARIF/JSON files found"
          
          if [ -f "snyk-container.sarif" ]; then
            echo "✅ SARIF file exists:"
            ls -la snyk-container.sarif
            echo "SARIF content preview:"
            head -20 snyk-container.sarif
          else
            echo "⚠️  SARIF file not found - this is normal if no vulnerabilities were detected"
            echo "Creating minimal SARIF file for GitHub Code Scanning compatibility"
            cat > snyk-container.sarif << 'EOF'
          {
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Snyk Container",
                    "informationUri": "https://snyk.io/",
                    "version": "1.0.0"
                  }
                },
                "results": []
              }
            ]
          }
          EOF
            echo "✅ Created minimal SARIF file"
          fi

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container

      - name: Archive container scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-container-results
          path: |
            snyk-container.sarif
            snyk-container.json
          retention-days: 30
          if-no-files-found: warn

  # Monitor deployed dependencies (only on main branch)
  monitor:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: maven

      - name: Monitor project with Snyk
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: >
            --project-name=${{ github.repository }}-production
            --target-reference=${{ github.ref }}
            --remote-repo-url=${{ github.server_url }}/${{ github.repository }}.git

  # Notification job for critical security issues
  notify:
    runs-on: ubuntu-latest
    needs: [security, container-security]
    if: failure() && github.event_name != 'pull_request'

    steps:
      - name: Send security alert
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            🚨 Critical security vulnerabilities detected in ${{ github.repository }}

            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}

            Please review the security scan results and take immediate action.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != null

      - name: Create GitHub issue for security vulnerabilities
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `🚨 Security vulnerabilities detected - ${context.sha.substring(0, 7)}`;
            const body = `
            Critical security vulnerabilities have been detected in the latest commit.

            **Details:**
            - Commit: ${context.sha}
            - Branch: ${context.ref}
            - Workflow: ${context.workflow}
            - Run: ${context.runNumber}

            **Action Required:**
            1. Review the security scan results in the Actions tab
            2. Check the Security tab for detailed vulnerability information
            3. Update affected dependencies or apply patches
            4. Re-run the security scan to verify fixes

            **Links:**
            - [Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})
            - [Security Tab](${context.payload.repository.html_url}/security)
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'urgent']
            });
